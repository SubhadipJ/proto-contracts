syntax = "proto3";

package com.greengrub.image;   // Recommended: use your company + service + version

option java_multiple_files = true;
option java_package = "com.greengrub.proto.image";
option java_outer_classname = "ImageServiceProto";

// ========================================
// ENUMS
// ========================================

enum CreatorType {
    CUSTOMER = 0;
    FOOD_REQUEST = 1;
}

// ========================================
// MESSAGES
// ========================================

message Image {
  string image_id = 1;
  string creator_id = 2;
  CreatorType creator_type = 3;
  optional string image_url = 4;
  string created_date = 5;
  string file_name = 6;
  optional string content_type =7;
  optional bytes image_data = 8;
}

// ========================================
// REQUEST MESSAGES
// ========================================

message UploadImagesRequest {
  string creator_id = 1;                    // Common creator for all images in this batch
  CreatorType creator_type = 2;
  repeated bytes image_data = 3;            // List of raw image bytes (one per image)
  string file_name = 4;
  string content_type = 5;
}

message GetImagesByCreatorRequest {
  string creator_id = 1;                    // This is the shared customerId / foodRequestId
}

message ImageByImageIdRequest {
  string image_id = 1;
}

// ============================================================
//  RESPONSE MESSAGES
// ============================================================

message DeleteImageByImageIdResponse {
  string message = 1;
}

message UploadImagesResponse {
  repeated string message = 1;
  string total_image_count = 2;
}

message GetImagesByCreatorResponse {
  repeated Image images = 1;                // List of raw image
}

// ========================================
// SERVICE DEFINITION
// ========================================
service ImageService {
  rpc UploadImages(UploadImagesRequest) returns (UploadImagesResponse);  // Batch upload multiple photos at once
  rpc GetImagesByCreator(GetImagesByCreatorRequest) returns (stream GetImagesByCreatorResponse);  // Get all photos for a given creator (customerId)
  rpc DeleteImagesByImageId(ImageByImageIdRequest) returns (DeleteImageByImageIdResponse); // Delete Image by Image Id
  rpc GetImageByImageId(ImageByImageIdRequest) returns (stream GetImagesByCreatorResponse); // Get Image By ImageId

}